<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Local Music Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f1220;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eaeaf0;
    }

    .app {
      width: 460px;
      height: 640px;
      background: #171a2b;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .header {
      padding: 14px;
      font-weight: 600;
      text-align: center;
      border-bottom: 1px solid #232756;
    }

    .now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid #232756;
    }

    .art {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: #2a2f55;
      object-fit: cover;
      flex-shrink: 0;
    }

    .np-title {
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search {
      padding: 8px 12px;
      border: none;
      outline: none;
      background: #111428;
      color: #fff;
      margin: 8px;
      border-radius: 8px;
    }

    .playlist {
      flex: 1;
      overflow-y: auto;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
    }

    .track:hover { background: #232756; }
    .track.active { background: #2e33aa; }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #4b6cb7, #182848);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .title {
      flex: 1;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player {
      border-top: 1px solid #232756;
      padding: 10px 12px;
      background: #14172a;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .player button {
      background: #2a2f55;
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      cursor: pointer;
    }

    .player button.active { background: #4b6cb7; }

    .seek {
      flex: 1 1 100%;
    }

    .volume {
      flex: 1 1 100px;
      max-width: 120px;
    }

    .error {
      padding: 16px;
      color: #ff9a9a;
      font-size: 0.85rem;
    }

    .info {
      padding: 16px;
      color: #9a9aff;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">My Music</div>

    <div class="now-playing">
      <img id="art" class="art" />
      <div id="npTitle" class="np-title">Nothing playing</div>
    </div>

    <input id="search" class="search" placeholder="Search…" />
    <div class="playlist" id="playlist"></div>

    <div class="player">
      <button id="prev">⏮</button>
      <button id="playPause">▶</button>
      <button id="next">⏭</button>
      <input id="seek" class="seek" type="range" min="0" max="100" value="0" />
      <input id="volume" class="volume" type="range" min="0" max="1" step="0.01" value="1" />
      <button id="shuffle">🔀</button>
      <button id="repeat">🔂</button>
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
    const audio = document.getElementById('audio');
    const playlistEl = document.getElementById('playlist');
    const searchEl = document.getElementById('search');
    const playPause = document.getElementById('playPause');
    const seek = document.getElementById('seek');
    const volume = document.getElementById('volume');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const shuffleBtn = document.getElementById('shuffle');
    const repeatBtn = document.getElementById('repeat');
    const artEl = document.getElementById('art');
    const npTitle = document.getElementById('npTitle');

    const MUSIC_ENDPOINT = '/music/list';
    const MUSIC_BASE = '/music/files/';
    const ART_ENDPOINT = '/music/art/';

    let tracks = [];
    let currentIndex = -1;
    let shuffle = false;
    let repeatOne = false;

    playPause.onclick = () => audio.paused ? audio.play() : audio.pause();
    audio.onplay = () => playPause.textContent = '⏸';
    audio.onpause = () => playPause.textContent = '▶';

    audio.ontimeupdate = () => {
      if (audio.duration) seek.value = (audio.currentTime / audio.duration) * 100;
    };

    seek.oninput = () => audio.currentTime = (seek.value / 100) * audio.duration;
    volume.oninput = () => audio.volume = volume.value;

    audio.onended = () => {
      if (repeatOne) {
        audio.currentTime = 0;
        audio.play();
      } else {
        next();
      }
    };

    prevBtn.onclick = () => playTrack((currentIndex - 1 + tracks.length) % tracks.length);
    nextBtn.onclick = next;

    shuffleBtn.onclick = () => {
      shuffle = !shuffle;
      shuffleBtn.classList.toggle('active', shuffle);
    };

    repeatBtn.onclick = () => {
      repeatOne = !repeatOne;
      repeatBtn.classList.toggle('active', repeatOne);
    };

    function next() {
      if (shuffle) {
        playTrack(Math.floor(Math.random() * tracks.length));
      } else {
        playTrack((currentIndex + 1) % tracks.length);
      }
    }

    function loadEmbeddedArt(file) {
      artEl.src = `${ART_ENDPOINT}${encodeURIComponent(file)}`;
      artEl.onerror = () => artEl.src = '';
    }

    function playTrack(index) {
      currentIndex = index;
      const file = tracks[index];
      audio.src = MUSIC_BASE + encodeURIComponent(file);
      audio.play();
      loadEmbeddedArt(file);
      npTitle.textContent = file;
      render(searchEl.value.toLowerCase());
      localStorage.setItem('lastTrack', index);
    }

    function render(filter = '') {
      playlistEl.innerHTML = '';
      tracks.forEach((file, i) => {
        if (!file.toLowerCase().includes(filter)) return;
        const row = document.createElement('div');
        row.className = 'track' + (i === currentIndex ? ' active' : '');
        row.innerHTML = `<div class="icon">♪</div><div class="title">${file}</div>`;
        row.onclick = () => playTrack(i);
        playlistEl.appendChild(row);
      });
      
      if (playlistEl.children.length === 0 && tracks.length > 0) {
        playlistEl.innerHTML = '<div class="info">No matches found</div>';
      }
    }

    searchEl.oninput = () => render(searchEl.value.toLowerCase());

    async function loadMusic() {
      try {
        const res = await fetch(MUSIC_ENDPOINT);
        const list = await res.json();
        tracks = list.filter(f => 
          f.endsWith('.webm') || 
          f.endsWith('.mkv') || 
          f.endsWith('.mp3') || 
          f.endsWith('.m4a') || 
          f.endsWith('.ogg')
        );
        
        if (tracks.length === 0) {
          playlistEl.innerHTML = '<div class="info">No music files found. Add .webm, .mkv, .mp3, .m4a, or .ogg files to the music folder.</div>';
          return;
        }
        
        const saved = localStorage.getItem('lastTrack');
        if (saved !== null && saved < tracks.length) {
          playTrack(Number(saved));
        }
        render();
      } catch (error) {
        console.error('Failed to load music:', error);
        playlistEl.innerHTML = '<div class="error">Failed to load music. Make sure the server is running.</div>';
      }
    }

    loadMusic();
  </script>
</body>
</html>
